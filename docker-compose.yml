version: "3.9"

services:
  xai-ids:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xai-ids-dashboard
    ports:
      - "8501:8501"
    volumes:
      # Mount your own CICIDS-2017 CSVs for retraining
      - ./data/raw:/app/data/raw:ro
      # Persist trained model artifacts
      - ./models:/app/models
      # Persist processed datasets
      - ./data/processed:/app/data/processed
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: xai-ids-network
