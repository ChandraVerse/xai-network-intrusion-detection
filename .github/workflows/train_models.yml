name: Train & Commit Model Artifacts

on:
  workflow_dispatch:   # manual trigger from Actions tab
  push:
    paths:
      - '.github/scripts/train_artifacts.py'   # auto-run when script changes

jobs:
  train:
    name: Train models and generate artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write   # needed to push artifacts back

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy>=1.24 \
            pandas>=2.0 \
            scikit-learn>=1.3 \
            joblib>=1.3 \
            xgboost>=2.0
          # Install TF CPU-only (lighter, faster on runners)
          pip install tensorflow-cpu
          python -c "import tensorflow as tf; print('TF:', tf.__version__)"
          python -c "import xgboost as xgb; print('XGB:', xgb.__version__)"

      # ── 4. Train all models & generate data artifacts ──────────────────────
      - name: Train models and generate artifacts
        run: python .github/scripts/train_artifacts.py

      # ── 5. Commit artifacts back to repo ───────────────────────────────────
      - name: Commit artifacts to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Force-add all artifact files (bypasses any leftover .gitignore rules)
          git add -f models/random_forest.pkl
          git add -f models/xgboost_model.pkl
          git add -f models/lstm_model.tar.gz
          git add -f models/rf_metrics.json
          git add -f models/xgb_metrics.json
          git add -f models/lstm_metrics.json
          git add -f models/metrics_summary.json
          git add -f models/feature_importance_rf.json
          git add -f models/label_map.json
          git add -f data/processed/X_train.npz
          git add -f data/processed/X_test.npz
          git add -f data/processed/y_train.npy
          git add -f data/processed/y_test.npy
          git add -f data/processed/scaler.pkl
          git add -f data/processed/label_encoder.pkl
          git add -f data/processed/feature_names.json
          git add -f data/processed/label_map.json
          git add -f data/samples/sample_200rows.csv

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit — artifacts already up to date."
          else
            git commit -m "chore: add trained model artifacts [skip ci]"
            git push origin main
            echo "Artifacts committed and pushed successfully."
          fi
