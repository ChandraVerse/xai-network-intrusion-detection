name: CI — XAI-NIDS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Single Python version — keeps CI fast and avoids duplicate failures
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      # FIX #1 — Ensure data/samples/ directory exists before generation.
      # generate_samples.py calls mkdir internally, but an explicit pre-check
      # prevents silent failures on runners where the working directory is
      # mounted read-only or where Path.mkdir raises on a symlink edge case.
      - name: Generate synthetic fixture data
        run: |
          mkdir -p data/samples
          python scripts/generate_samples.py --rows 200 --out data/samples/sample_100.csv
          echo "Fixture data ready:"
          ls -lh data/samples/

      # FIX #6 — Set PYTHONPATH=. so `from src.xxx import yyy` resolves
      # correctly without relying solely on the sys.path.insert in conftest.
      - name: Run unit + integration tests
        env:
          PYTHONPATH: "."
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py \
            --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # FIX #4 — dashboard/ removed from flake8 target.
      # dashboard/app.py imports streamlit at the top level; streamlit is NOT
      # installed in the CI environment (removed from requirements-ci.txt).
      # flake8 would raise E902 ModuleNotFoundError for every dashboard file.
      # dashboard/ is also added to the exclude list in .flake8.
      - name: Lint with flake8
        # Uses settings from .flake8 in repo root — no inline flags that override config
        run: |
          flake8 src/ scripts/

      # FIX #5 — Explicit existence guard before reading the CSV.
      # If the generation step failed silently, this produces a clear error
      # message instead of an obscure pandas FileNotFoundError.
      - name: Verify sample data schema
        run: |
          if [ ! -f data/samples/sample_100.csv ]; then
            echo "ERROR: data/samples/sample_100.csv not found — generation step may have failed."
            exit 1
          fi
          python - <<'EOF'
          import pandas as pd
          from scripts.generate_samples import FEATURE_NAMES, CLASSES
          df = pd.read_csv("data/samples/sample_100.csv")
          assert list(df.columns[:-1]) == FEATURE_NAMES, "Column mismatch!"
          assert df.shape[1] == 79, f"Expected 79 cols (78 features + Label), got {df.shape[1]}"
          assert set(df['Label'].unique()).issubset(set(CLASSES)), "Unknown labels in sample!"
          print(f"[OK] Schema check passed: {df.shape[0]} rows x {df.shape[1]} cols")
          EOF

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image (validate Dockerfile)
        run: |
          docker build -t xai-nids:ci-test .

  generate-sample-data:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas

      - name: Generate sample data (smoke test)
        run: |
          python scripts/generate_samples.py --rows 100 --out /tmp/smoke_test.csv
          python -c "
          import pandas as pd
          df = pd.read_csv('/tmp/smoke_test.csv')
          print(f'[OK] Smoke test passed: {df.shape}')
          assert df.shape == (100, 79), f'Shape mismatch: {df.shape}'
          "

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      # FIX #7 — Replace invalid shell glob `src/**/__pycache__` with the
      # correct bandit --exclude syntax: a comma-separated list of path
      # prefixes. Bandit does NOT expand ** shell globs — it expects simple
      # directory names or relative paths as strings.
      - name: Security scan (Bandit)
        run: |
          bandit -r src/ scripts/ \
            -ll \
            --exclude __pycache__,.git \
            -f txt
