name: CI — XAI-NIDS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Generate synthetic fixture data
        run: |
          python scripts/generate_samples.py --rows 200 --out data/samples/sample_100.csv
          echo "Fixture data ready:"
          ls -lh data/samples/

      - name: Run unit + integration tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_integration.py \
            --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Lint with flake8
        run: |
          flake8 src/ dashboard/ scripts/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --exclude=__pycache__,.git

      - name: Verify sample data schema
        run: |
          python - <<'EOF'
          import pandas as pd
          from scripts.generate_samples import FEATURE_NAMES, CLASSES
          df = pd.read_csv("data/samples/sample_100.csv")
          assert list(df.columns[:-1]) == FEATURE_NAMES, "Column mismatch!"
          assert df.shape[1] == 79, f"Expected 79 cols (78 features + Label), got {df.shape[1]}"
          assert set(df['Label'].unique()).issubset(set(CLASSES)), "Unknown labels in sample!"
          print(f"[OK] Schema check passed: {df.shape[0]} rows x {df.shape[1]} cols")
          EOF
