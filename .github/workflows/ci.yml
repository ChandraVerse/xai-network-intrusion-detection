name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint + Unit Tests + Coverage ─────────────────────────────────────
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy>=1.24.0 \
            pandas>=2.0.0 \
            scipy>=1.10.0 \
            scikit-learn>=1.3.0 \
            imbalanced-learn>=0.11.0 \
            shap>=0.44.0 \
            lime>=0.2.0 \
            joblib>=1.3.0 \
            pytest>=7.4.0 \
            pytest-cov>=4.1.0 \
            flake8>=6.1.0
          # XGBoost: fail-safe if unavailable
          pip install xgboost>=2.0.0 || echo "[WARN] xgboost not installed"
          # TF-CPU is heavy — install quietly, skip LSTM tests if absent
          pip install tensorflow-cpu>=2.13.0 || echo "[WARN] tensorflow not installed"

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ scripts/ \
            --max-line-length=120 \
            --ignore=E203,W503,E501 \
            --exclude=__pycache__,.git

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short \
            -v

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Sample CSV smoke test ────────────────────────────────────────────
  sample-data:
    name: Generate sample data (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install numpy pandas
      - name: Generate sample CSVs
        run: python scripts/generate_samples.py
      - name: Verify outputs
        run: |
          test -f data/samples/sample_10rows.csv
          test -f data/samples/sample_100rows.csv
          test -f data/samples/sample_benign_only.csv
          test -f data/samples/sample_attack_mix.csv
          echo "All sample files generated successfully."

  # ── Job 3: Security scan (Bandit) ────────────────────────────────────────────
  security:
    name: Security scan (Bandit)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install bandit
      - name: Run Bandit
        run: |
          bandit -r src/ scripts/ \
            --severity-level medium \
            --confidence-level medium \
            --format txt \
            --exit-zero

  # ── Job 4: Docker build validation ───────────────────────────────────────────
  docker-build:
    name: Docker build (validate Dockerfile)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag xai-nids:ci-${{ github.sha }} \
            --no-cache \
            .
        # Continue even if the build fails (Dockerfile may be a work-in-progress)
        continue-on-error: true
